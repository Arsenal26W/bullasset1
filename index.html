<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bull Asset Manager v1.8.0</title>
    <link class="apple-touch-icon" rel="apple-touch-icon" href="redbull.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0f0f0f; 
            color: #f1f1f1; 
            font-family: 'Noto Sans KR', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, select { 
            background-color: #1f1f1f !important; 
            border: 1px solid #373737 !important; 
            color: #f1f1f1 !important; 
            appearance: none; 
            -webkit-appearance: none; 
            border-radius: 12px; 
        }
        input:focus, select:focus { border-color: #ff4e4e !important; outline: none; }
        .bull-card { background-color: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 16px; }
        .grey-box { background-color: #2d2d2d; color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; display: inline-block; }
        .red-roi-badge { background-color: #ff4e4e; color: #fff; padding: 6px 12px; border-radius: 10px; font-weight: 900; font-size: 16px; }
        .blue-roi-badge { background-color: #38bdf8; color: #fff; padding: 6px 12px; border-radius: 10px; font-weight: 900; font-size: 16px; }

        /* 로딩 오버레이 */
        #loading-overlay {
            position: fixed; inset: 0; background: #0f0f0f;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; gap: 20px;
        }
        #loading-overlay.hidden { display: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #2d2d2d;
            border-top-color: #ff4e4e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 저장 중 인디케이터 */
        #sync-indicator {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; border: 1px solid #2d2d2d;
            color: #888; font-size: 11px; padding: 6px 14px;
            border-radius: 20px; z-index: 1000;
            display: flex; align-items: center; gap: 6px;
            transition: opacity 0.3s; opacity: 0; pointer-events: none;
        }
        #sync-indicator.show { opacity: 1; }
        #sync-indicator .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #ff4e4e; animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
</head>
<body class="p-4 min-h-screen pb-24 select-none">

    <!-- 로딩 오버레이 -->
    <div id="loading-overlay">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-[#ff4e4e] text-center">BULL <span class="text-white">ASSET</span></h1>
            <p class="text-[10px] text-[#555] text-center mt-1">데이터 동기화 중...</p>
        </div>
        <div class="spinner"></div>
        <p id="loading-msg" class="text-xs text-[#555]">Google Sheets에서 불러오는 중</p>
    </div>

    <!-- 동기화 인디케이터 -->
    <div id="sync-indicator"><div class="dot"></div><span id="sync-text">저장 중...</span></div>

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-4 px-1">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-[#ff4e4e] flex items-center gap-1.5">
                    BULL <span class="text-white">ASSET</span>
                    <img src="redbull.png" alt="Bull Icon" class="h-6 w-auto object-contain">
                </h1>
                <p class="text-[10px] text-[#888]">Google Cloud v2.0</p>
            </div>
            <div class="flex gap-1.5 items-center">
                <button onclick="syncFromSheets()" class="bg-[#2d2d2d] text-white p-2 rounded-xl text-xs" title="Google Sheets에서 새로고침"><i class="fa-solid fa-rotate"></i></button>
                <button onclick="backupAllData()" class="bg-[#2d2d2d] text-white p-2 rounded-xl text-xs" title="전체 데이터 백업 다운로드"><i class="fa-solid fa-download"></i></button>
                <button onclick="document.getElementById('upload-file').click()" class="bg-[#2d2d2d] text-white p-2 rounded-xl text-xs" title="백업 파일 복원 업로드"><i class="fa-solid fa-upload"></i></button>
                <input type="file" id="upload-file" class="hidden" accept=".json" onchange="restoreAllData(event)">
                <button onclick="openModal()" class="bg-[#ff4e4e] active:scale-95 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg transition-all ml-0.5">+ 입력</button>
            </div>
        </header>

        <div class="grid grid-cols-4 gap-1 bg-[#1a1a1a] p-1 rounded-xl border border-[#2d2d2d] mb-5">
            <button onclick="switchCategory('us')" id="cat-tab-us" class="py-2 rounded-lg text-xs font-black bg-[#ff4e4e] text-white transition-all">🇺🇸 미국</button>
            <button onclick="switchCategory('kr')" id="cat-tab-kr" class="py-2 rounded-lg text-xs font-black text-[#888] transition-all">🇰🇷 한국</button>
            <button onclick="switchCategory('pension')" id="cat-tab-pension" class="py-2 rounded-lg text-xs font-black text-[#888] transition-all">🔑 연금</button>
            <button onclick="switchCategory('re')" id="cat-tab-re" class="py-2 rounded-lg text-xs font-black text-[#888] transition-all">🏠 부동산</button>
        </div>

        <div id="sub-tab-bar" class="flex gap-2 mb-5 overflow-x-auto no-scrollbar"></div>

        <div id="main-viewport" class="space-y-4"></div>
    </div>

    <div id="input-modal" class="fixed inset-0 bg-black/90 flex items-end justify-center z-50 hidden">
        <div class="bg-[#1a1a1a] w-full rounded-t-3xl p-6 space-y-5 animate-in slide-in-from-bottom duration-300">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-black flex items-center gap-2">📝 <span id="modal-cat-title">미국주식</span> 데이터 기록</h3>
                <button onclick="closeModal()" class="text-[#888] text-2xl font-bold p-2">&times;</button>
            </div>
            <div id="modal-tab-bar" class="flex border-b border-[#2d2d2d]"></div>
            <div id="modal-content" class="py-2 max-h-[60vh] overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════
        // ██  GOOGLE SHEETS 동기화 DB 레이어  ██
        // ═══════════════════════════════════════════════════════
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzhPJeMo8gPf36N-ozrMeYbKtZuQih3bHAd5BH6toZ_nXVJtFA39x7Rl5a7SvtRxgJR/exec';

        // 메모리 캐시 (로드 후 모든 읽기는 여기서, 쓰기는 캐시+Sheets 동시)
        const cache = {};

        const DB = {
            get(key) {
                if (cache[key] !== undefined) return cache[key];
                return null;
            },
            set(key, value) {
                cache[key] = value;
                // 비동기로 Sheets에 저장 (UI 블로킹 없음)
                _saveToSheets(key, value);
            },
            // 전체 캐시를 한 번에 Sheets로 올리기 (restore용)
            async setAll(data) {
                Object.assign(cache, data);
                await _saveAllToSheets(data);
            }
        };

        function showSync(text) {
            const el = document.getElementById('sync-indicator');
            document.getElementById('sync-text').textContent = text || '저장 중...';
            el.classList.add('show');
        }
        function hideSync() {
            setTimeout(() => document.getElementById('sync-indicator').classList.remove('show'), 1200);
        }

        async function _saveToSheets(key, value) {
            try {
                showSync('Sheets 저장 중...');
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'set', key, value })
                });
                hideSync();
            } catch(e) {
                console.warn('Sheets 저장 실패 (캐시는 유지됨):', e);
                showSync('⚠ 저장 실패 (재시도 필요)');
                setTimeout(() => hideSync(), 3000);
            }
        }

        async function _saveAllToSheets(data) {
            try {
                showSync('Sheets 전체 업로드 중...');
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'setAll', data })
                });
                showSync('✅ 동기화 완료');
                hideSync();
            } catch(e) {
                console.warn('Sheets 전체 저장 실패:', e);
                showSync('⚠ 업로드 실패');
                setTimeout(() => hideSync(), 3000);
            }
        }

        async function syncFromSheets() {
            showLoadingOverlay('Google Sheets에서 불러오는 중...');
            try {
                const res = await fetch(GAS_URL + '?action=getAll');
                const json = await res.json();
                if(json.ok && json.data) {
                    Object.assign(cache, json.data);
                    hideLoadingOverlay();
                    switchCategory(activeCat);
                    showSync('✅ 동기화 완료');
                    hideSync();
                } else {
                    hideLoadingOverlay();
                    alert('Sheets에서 데이터를 불러올 수 없습니다.');
                }
            } catch(e) {
                hideLoadingOverlay();
                alert('Sheets 연결 실패: ' + e.message);
            }
        }

        function showLoadingOverlay(msg) {
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-msg').textContent = msg || '로딩 중...';
        }
        function hideLoadingOverlay() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        // ═══════════════════════════════════════════════════════
        // ██  기존 앱 코드 (localStorage → DB 로 전환)  ██
        // ═══════════════════════════════════════════════════════

        const KEYS = {
            us: { inv: 'B_INV_US', bal: 'B_BAL_US', int: 'B_INT_US' },
            kr: { inv: 'B_INV_KR', bal: 'B_BAL_KR' },
            pension: { inv: 'B_INV_PEN', bal: 'B_BAL_PEN' },
            re: { settings: 'B_RE_SET', loan: 'B_LOAN_RE' }
        };
        const liveRate = 1350;

        let activeCat = 'us'; let activeTab = 'status';
        let investSub = 'yearly'; let balanceSub = 'yearly';
        let periodicSub = 'month'; let interestSub = 'yearly';
        let periodicMode = 'list'; let modalActiveTab = '';
        let isInvestOpen = false; let isBalanceOpen = false;
        
        let reCompanySub = 'yearly'; let reCreditSub = 'yearly';
        let isReCompanyOpen = false; let isReCreditOpen = false;

        // 앱 시작: Sheets에서 전체 데이터 로드
        window.onload = async function() {
            showLoadingOverlay('Google Sheets에서 불러오는 중...');
            try {
                const res = await fetch(GAS_URL + '?action=getAll');
                const json = await res.json();
                if(json.ok && json.data) {
                    Object.assign(cache, json.data);
                    // Sheets에 데이터가 없으면 목 데이터 삽입
                    if(!cache[KEYS.us.inv]) {
                        await initDefaultMockData();
                    }
                } else {
                    initDefaultMockDataSync();
                }
            } catch(e) {
                console.warn('Sheets 로드 실패, 로컬 캐시로 시작:', e);
                initDefaultMockDataSync();
            }
            hideLoadingOverlay();
            switchCategory('us');
        };

        function initDefaultMockDataSync() {
            // Sheets 연결 실패 시 빈 데이터로 시작 (로컬 캐시만)
            if(!cache[KEYS.us.inv]) {
                cache[KEYS.us.inv] = JSON.stringify([{id:1, date:"2025-10-15", krw:60000000, rate:1365, usd:43956}, {id:2, date:"2026-01-10", krw:50000000, rate:1318, usd:37936}, {id:3, date:"2026-04-15", krw:10000000, rate:1348, usd:7418}]);
                cache[KEYS.us.bal] = JSON.stringify([{year:"2025", month:"10", usd:20000, rate:1345}, {year:"2025", month:"12", usd:20000, rate:1352}, {year:"2026", month:"01", usd:20000, rate:1318}, {year:"2026", month:"04", usd:21500, rate:1348}]);
                cache[KEYS.us.int] = JSON.stringify([{year:"2025", month:"12", total:300000}, {year:"2026", month:"04", total:450000}]);
                cache[KEYS.kr.inv] = JSON.stringify([{id:1, date:"2026-01-15", krw:30000000}]);
                cache[KEYS.kr.bal] = JSON.stringify([{year:"2026", month:"01", krw:29000000}, {year:"2026", month:"04", krw:33000000}]);
                cache[KEYS.pension.inv] = JSON.stringify([{id:1, date:"2026-02-10", type:"irp", krw:5000000}, {id:2, date:"2026-02-11", type:"pension", krw:3000000}]);
                cache[KEYS.pension.bal] = JSON.stringify([{year:"2026", month:"04", irp:5200000, pension:3100000}]);
                cache[KEYS.re.settings] = JSON.stringify({jeonse:300000000, loan:150000000, actual:690000000, invest:0});
                cache[KEYS.re.loan] = JSON.stringify([{year:"2025", month:"12", company1:50000, company2:50000, company3:0, company4:0, credit1:100000, credit2:0, credit3:0, total:200000}, {year:"2026", month:"04", company1:100000, company2:50000, company3:0, company4:0, credit1:200000, credit2:0, credit3:0, total:350000}]);
            }
        }

        async function initDefaultMockData() {
            initDefaultMockDataSync();
            // Sheets가 비어있으면 목 데이터를 Sheets로 업로드
            await _saveAllToSheets(cache);
        }

        function switchCategory(cat) {
            activeCat = cat; activeTab = 'status'; investSub = 'yearly'; balanceSub = 'yearly'; periodicSub = 'month'; periodicMode = 'list'; 
            reCompanySub = 'yearly'; reCreditSub = 'yearly'; isReCompanyOpen = false; isReCreditOpen = false; isInvestOpen = false; isBalanceOpen = false;
            ['us','kr','pension','re'].forEach(c => {
                const el = document.getElementById('cat-tab-' + c);
                if(el) el.className = c === cat ? "py-2 rounded-lg text-xs font-black bg-[#ff4e4e] text-white transition-all" : "py-2 rounded-lg text-xs font-black text-[#888] transition-all";
            });
            renderSubTabBar(); renderMainViewport();
        }

        function renderSubTabBar() {
            const bar = document.getElementById('sub-tab-bar'); if(!bar) return;
            if(activeCat === 're') {
                bar.innerHTML = `<button onclick="switchSubTab('status')" id="sub-tab-status" class="px-5 py-2.5 rounded-full text-xs bg-[#ff4e4e] text-white font-bold whitespace-nowrap">📊 현황표</button><button onclick="switchSubTab('loan')" id="sub-tab-loan" class="px-5 py-2.5 rounded-full text-xs bg-[#1a1a1a] text-[#888] font-bold whitespace-nowrap">💸 대출이자</button>`;
            } else {
                bar.innerHTML = `<button onclick="switchSubTab('status')" id="sub-tab-status" class="px-5 py-2.5 rounded-full text-xs bg-[#ff4e4e] text-white font-bold whitespace-nowrap">📊 현황표</button><button onclick="switchSubTab('periodic')" id="sub-tab-periodic" class="px-5 py-2.5 rounded-full text-xs bg-[#1a1a1a] text-[#888] font-bold whitespace-nowrap">📈 집계표</button>${activeCat === 'us' ? '<button onclick="switchSubTab(\'interest\')" id="sub-tab-interest" class="px-5 py-2.5 rounded-full text-xs bg-[#1a1a1a] text-[#888] font-bold whitespace-nowrap">💸 은행이자</button>' : ''}`;
            }
        }

        function switchSubTab(tab) {
            activeTab = tab;
            renderSubTabBar();
            document.querySelectorAll('[id^="sub-tab-"]').forEach(btn => { btn.classList.replace('bg-[#ff4e4e]', 'bg-[#1a1a1a]'); btn.classList.replace('text-white', 'text-[#888]'); });
            const target = document.getElementById('sub-tab-' + tab); if(target) { target.classList.replace('bg-[#1a1a1a]', 'bg-[#ff4e4e]'); target.classList.replace('text-[#888]', 'text-white'); }
            setTimeout(renderMainViewport, 10);
        }

        function renderMainViewport() {
            const vp = document.getElementById('main-viewport'); if(!vp) return; vp.innerHTML = '';
            const inv = JSON.parse(DB.get(KEYS[activeCat]?.inv)) || [];
            const bal = JSON.parse(DB.get(KEYS[activeCat]?.bal)) || [];
            const int = JSON.parse(DB.get(KEYS[activeCat]?.int)) || [];

            if(activeTab === 'status') {
                if(activeCat === 'us') {
                    let tKRW = inv.reduce((s,x)=>s+Number(x.krw),0); let tUSD = inv.reduce((s,x)=>s+Number(x.usd),0);
                    let sortedBal = [...bal].sort((a,b)=>Number(b.year+b.month.padStart(2,'0'))-Number(a.year+a.month.padStart(2,'0')));
                    let cUSD = sortedBal.length > 0 ? Number(sortedBal[0].usd) : 0;
                    let lRate = sortedBal.length > 0 ? (sortedBal[0].rate || liveRate) : liveRate;
                    let netUSD = cUSD - tUSD; let netKRW = (cUSD * lRate) - tKRW;
                    let roi = tUSD > 0 ? ((netUSD / tUSD) * 100).toFixed(1) : "0.0"; let isPlus = netUSD >= 0;

                    vp.innerHTML = `
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bull-card p-4"><div class="text-[10px] text-[#888] mb-1">총 투입 자금</div><div class="text-lg font-black text-white">$ ${tUSD.toLocaleString()}</div><div class="text-[10px] text-[#666] mt-1">₩ ${tKRW.toLocaleString()}</div></div>
                            <div class="bull-card p-4"><div class="text-[10px] text-[#888] mb-1">현재 계좌잔고</div><div class="text-lg font-black text-white">$ ${cUSD.toLocaleString()}</div><div class="text-[10px] text-[#666] mt-1">₩ ${(cUSD * lRate).toLocaleString()}</div></div>
                            <div class="bull-card p-5 col-span-2 ${isPlus ? 'bg-gradient-to-br from-[#1a1a1a] to-[#251414]' : 'bg-gradient-to-br from-[#1a1a1a] to-[#141d25]'} flex justify-between items-center">
                                <div><div class="text-[11px] ${isPlus ? 'text-[#ff4e4e]' : 'text-sky-400'} mb-1 font-bold">순 누적수익</div><div class="text-2xl font-black ${isPlus ? 'text-[#ff4e4e]' : 'text-sky-400'}">${isPlus ? '+' : ''}$ ${netUSD.toLocaleString()}</div><div class="text-xs ${isPlus ? 'text-[#ff4e4e]' : 'text-sky-400'} opacity-80">₩ ${netKRW.toLocaleString()}</div></div>
                                <div class="${isPlus ? 'red-roi-badge' : 'blue-roi-badge'}">${isPlus ? '+' : ''}${roi}%</div>
                            </div>
                        </div>
                        ${getAccordionMarkup('투입 자금', 'invest', inv)}
                        ${getAccordionMarkup('계좌 잔고', 'balance', bal)}
                    `;
                } 
                else if(activeCat === 'kr') {
                    let tKRW = inv.reduce((s,x)=>s+Number(x.krw),0);
                    let sortedBal = [...bal].sort((a,b)=>(b.year+b.month)-(a.year+a.month));
                    let cKRW = sortedBal.length > 0 ? Number(sortedBal[0].krw) : 0;
                    let netKRW = cKRW - tKRW; let roi = tKRW > 0 ? ((netKRW / tKRW) * 100).toFixed(1) : "0.0"; let isPlus = netKRW >= 0;

                    vp.innerHTML = `
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bull-card p-4"><div class="text-[10px] text-[#888] mb-1">총 투입 자금</div><div class="text-lg font-black text-white">₩ ${tKRW.toLocaleString()}</div></div>
                            <div class="bull-card p-4"><div class="text-[10px] text-[#888] mb-1">현재 계좌잔고</div><div class="text-lg font-black text-white">₩ ${cKRW.toLocaleString()}</div></div>
                            <div class="bull-card p-5 col-span-2 ${isPlus ? 'bg-gradient-to-br from-[#1a1a1a] to-[#251414]' : 'bg-gradient-to-br from-[#1a1a1a] to-[#141d25]'} flex justify-between items-center">
                                <div><div class="text-[11px] ${isPlus ? 'text-[#ff4e4e]' : 'text-sky-400'} mb-1 font-bold">순 누적수익</div><div class="text-2xl font-black ${isPlus ? 'text-[#ff4e4e]' : 'text-sky-400'}">${isPlus ? '+' : ''}₩ ${netKRW.toLocaleString()}</div></div>
                                <div class="${isPlus ? 'red-roi-badge' : 'blue-roi-badge'}">${isPlus ? '+' : ''}${roi}%</div>
                            </div>
                        </div>
                        ${getAccordionMarkup('투입 자금', 'invest', inv)}
                        ${getAccordionMarkup('계좌 잔고', 'balance', bal)}
                    `;
                }
                else if(activeCat === 'pension') {
                    let tKRW = inv.reduce((s,x)=>s+Number(x.krw),0);
                    let sortedBal = [...bal].sort((a,b)=>(b.year+b.month)-(a.year+a.month));
                    let latestBal = sortedBal.length > 0 ? sortedBal[0] : {irp:0, pension:0};
                    let cKRW = Number(latestBal.irp || 0) + Number(latestBal.pension || 0);
                    let netKRW = cKRW - tKRW; let roi = tKRW > 0 ? ((netKRW / tKRW) * 100).toFixed(1) : "0.0"; let isPlus = netKRW >= 0;

                    vp.innerHTML = `
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bull-card p-4"><div class="text-[10px] text-[#888] mb-1">총 투입 자금</div><div class="text-lg font-black text-white">₩ ${tKRW.toLocaleString()}</div></div>
                            <div class="bull-card p-4"><div class="text-[10px] text-[#888] mb-1">현재 계좌잔고</div><div class="text-lg font-black text-white">₩ ${cKRW.toLocaleString()}</div></div>

        function renderPeriodicData() {
            const listViewport = document.getElementById('periodic-content-viewport');
            const chartViewport = document.getElementById('periodic-chart-viewport');
            if(!listViewport) return;

            const inv = JSON.parse(DB.get(KEYS[activeCat].inv)) || [];
            const bal = JSON.parse(DB.get(KEYS[activeCat].bal)) || [];
            
            if (bal.length === 0) {
                listViewport.innerHTML = '<div class="text-center text-xs text-[#666] py-12">집계표 산출 데이터가 부족합니다. 먼저 계좌잔고를 기입해 주세요.</div>';
                return;
            }

            const chronInv = [...inv].sort((a,b)=>new Date(a.date)-new Date(b.date));
            const chronBal = [...bal].sort((a,b)=>(a.year+a.month)-(b.year+b.month));
            let periods = [];

            if(periodicSub === 'month') {
                chronBal.forEach(b => {
                    let y = b.year; let m = b.month;
                    let lastDec = chronBal.find(x => x.year == String(Number(y)-1) && x.month == "12");
                    let startOfYearBal = 0;
                    if(activeCat === 'us') startOfYearBal = lastDec ? Number(lastDec.usd) : 0;
                    else if(activeCat === 'kr') startOfYearBal = lastDec ? Number(lastDec.krw) : 0;
                    else if(activeCat === 'pension') startOfYearBal = lastDec ? (Number(lastDec.irp||0)+Number(lastDec.pension||0)) : 0;

                    let ytdInvest = 0; let monthInvest = 0;
                    if(activeCat === 'us') {
                        ytdInvest = chronInv.filter(x => x.date.startsWith(y) && x.date.split('-')[1] <= m).reduce((s,x)=>s+Number(x.usd),0);
                        monthInvest = chronInv.filter(x => x.date.startsWith(y) && x.date.split('-')[1] == m).reduce((s,x)=>s+Number(x.usd),0);
                    } else {
                        ytdInvest = chronInv.filter(x => x.date.startsWith(y) && x.date.split('-')[1] <= m).reduce((s,x)=>s+Number(x.krw),0);
                        monthInvest = chronInv.filter(x => x.date.startsWith(y) && x.date.split('-')[1] == m).reduce((s,x)=>s+Number(x.krw),0);
                    }

                    let annualBalance = startOfYearBal + ytdInvest;
                    let accountBalance = activeCat === 'us' ? Number(b.usd) : (activeCat === 'pension' ? (Number(b.irp||0)+Number(b.pension||0)) : Number(b.krw));

                    cc.innerHTML = `<form onsubmit="handleFormSubmit(event)" class="space-y-4"><div class="grid grid-cols-2 gap-2"><select id="f-year" class="p-4">${yOptions}</select><select id="f-month" class="p-4">${mOptions}</select></div><div class="grid grid-cols-2 gap-2"><div><label class="block text-[10px] text-[#888] mb-1">달러 계좌 잔고 ($)</label><input type="text" id="f-usd" placeholder="달러잔고" required class="w-full p-4" oninput="formatComma(this)"></div><div><label class="block text-[10px] text-[#888] mb-1">적용 고시 환율 (₩)</label><input type="text" id="f-rate" placeholder="현재환율" required class="w-full p-4" oninput="formatComma(this)"></div></div><button class="w-full bg-[#ff4e4e] py-4 rounded-xl font-black text-white">기록 저장</button></form>`;
                } else if(tab === 'interest') {
                    cc.innerHTML = `<form onsubmit="handleFormSubmit(event)" class="space-y-4"><div class="grid grid-cols-2 gap-2"><select id="f-year" class="p-4">${yOptions}</select><select id="f-month" class="p-4">${mOptions}</select></div><div class="grid grid-cols-2 gap-2"><div><label class="block text-[10px] text-[#888] mb-1">이자 1</label><input type="text" id="f-i1" placeholder="원화입력" required class="w-full p-4" oninput="formatComma(this)"></div><div><label class="block text-[10px] text-[#888] mb-1">이자 2</label><input type="text" id="f-i2" placeholder="원화입력" required class="w-full p-4" oninput="formatComma(this)"></div></div><button class="w-full bg-[#ff4e4e] py-4 rounded-xl font-black text-white">기록 저장</button></form>`;
                }
            } 
            else if(activeCat === 'kr') {
                if(tab === 'invest') {
                    cc.innerHTML = `<form onsubmit="handleFormSubmit(event)" class="space-y-4"><input type="date" id="f-date" required class="w-full p-4"><input type="text" id="f-krw" placeholder="원화입력" required class="w-full p-4" oninput="formatComma(this)"><button class="w-full bg-[#ff4e4e] py-4 rounded-xl font-black text-white">기록 저장</button></form>`;
                } else if(tab === 'balance') {
                    cc.innerHTML = `<form onsubmit="handleFormSubmit(event)" class="space-y-4"><div class="grid grid-cols-2 gap-2"><select id="f-year" class="p-4">${yOptions}</select><select id="f-month" class="p-4">${mOptions}</select></div><input type="text" id="f-krw" placeholder="원화 계좌잔고" required class="w-full p-4" oninput="formatComma(this)"><button class="w-full bg-[#ff4e4e] py-4 rounded-xl font-black text-white">기록 저장</button></form>`;
                }
            }
            else if(activeCat === 'pension') {
                if(tab === 'invest') {
                    cc.innerHTML = `<form onsubmit="handleFormSubmit(event)" class="space-y-4"><input type="date" id="f-date" required class="w-full p-4"><div class="grid grid-cols-2 gap-2"><div><label class="block text-[10px] text-[#888] mb-1 pl-1">퇴직연금 투입액 (₩)</label><input type="text" id="f-irp" placeholder="퇴직연금" class="w-full p-4" oninput="formatComma(this)"></div><div><label class="block text-[10px] text-[#888] mb-1 pl-1">연금저축 투입액 (₩)</label><input type="text" id="f-pension" placeholder="연금저축" class="w-full p-4" oninput="formatComma(this)"></div></div><button class="w-full bg-[#ff4e4e] py-4 rounded-xl font-black text-white">기록 저장</button></form>`;
                } else if(tab === 'balance') {
                    cc.innerHTML = `<form onsubmit="handleFormSubmit(event)" class="space-y-4"><div class="grid grid-cols-2 gap-2"><select id="f-year" class="p-4">${yOptions}</select><select id="f-month" class="p-4">${mOptions}</select></div><div class="grid grid-cols-2 gap-2"><div><label class="block text-[10px] text-[#888] mb-1 pl-1">퇴직연금 잔고 (₩)</label><input type="text" id="f-irp" placeholder="원화입력" required class="w-full p-4" oninput="formatComma(this)"></div><div><label class="block text-[10px] text-[#888] mb-1 pl-1">연금저축 잔고 (₩)</label><input type="text" id="f-pension" placeholder="원화입력" required class="w-full p-4" oninput="formatComma(this)"></div></div><button class="w-full bg-[#ff4e4e] py-4 rounded-xl font-black text-white">기록 저장</button></form>`;
                }
            }
            else if(activeCat === 're' && tab === 'loan') {
                cc.innerHTML = `
                    <form onsubmit="handleFormSubmit(event)" class="space-y-4 text-xs">
                        <div class="grid grid-cols-2 gap-2"><select id="f-year" class="p-4">${yOptions}</select><select id="f-month" class="p-4">${mOptions}</select></div>
                        <div class="p-3 bg-[#111] rounded-xl border border-[#2d2d2d] space-y-3"><span class="text-white font-black block">🏢 회사대출</span><div class="grid grid-cols-2 gap-2"><input type="text" id="f-c1" placeholder="주택대부1" class="p-3" oninput="formatComma(this)"><input type="text" id="f-c2" placeholder="주택대부2" class="p-3" oninput="formatComma(this)"><input type="text" id="f-c3" placeholder="생안자1" class="p-3" oninput="formatComma(this)"><input type="text" id="f-c4" placeholder="생안자2" class="p-3" oninput="formatComma(this)"></div></div>
                        <div class="p-3 bg-[#111] rounded-xl border border-[#2d2d2d] space-y-3"><span class="text-white font-black block">💳 신용대출</span><div class="grid grid-cols-3 gap-1"><input type="text" id="f-cr1" placeholder="신용1" class="p-3" oninput="formatComma(this)"><input type="text" id="f-cr2" placeholder="신용2" class="p-3" oninput="formatComma(this)"><input type="text" id="f-cr3" placeholder="신용3" class="p-3" oninput="formatComma(this)"></div></div>
                        <button class="w-full bg-[#ff4e4e] py-4 rounded-xl font-black text-white">기록 저장</button>
                    </form>
                `;
            }
            restoreDraft(tab);
        }

        function handleFormSubmit(e) {
            e.preventDefault(); triggerSaveFeedback();
            delete modalDraft[modalActiveTab];

            if(activeCat === 'us') {
                let subKey = modalActiveTab==='invest'?'inv':(modalActiveTab==='balance'?'bal':'int');
                let list = JSON.parse(DB.get(KEYS.us[subKey])) || [];
                if(modalActiveTab === 'invest') {
                    let k = parseNum(document.getElementById('f-krw').value || 0); let u = parseNum(document.getElementById('f-usd').value || 0);
                    list.push({id:Date.now(), date:document.getElementById('f-date').value, krw:k, usd:u, rate:u > 0 ? Math.round(k/u) : liveRate});
                } else if(modalActiveTab === 'balance') {
                    let y = document.getElementById('f-year').value; let m = document.getElementById('f-month').value; list = list.filter(x=>!(x.year===y && x.month===m));
                    list.push({year:y, month:m, usd:parseNum(document.getElementById('f-usd').value || 0), rate:parseNum(document.getElementById('f-rate').value || liveRate)});
                } else {
                    let y = document.getElementById('f-year').value; let m = document.getElementById('f-month').value; list = list.filter(x=>!(x.year===y && x.month===m));
                    let i1 = parseNum(document.getElementById('f-i1').value || 0); let i2 = parseNum(document.getElementById('f-i2').value || 0);
                    list.push({year:y, month:m, total:i1+i2});
                }
                DB.set(KEYS.us[subKey], JSON.stringify(list));
            } 
            else if(activeCat === 'kr') {
                let subKey = modalActiveTab==='invest'?'inv':'bal';
                let list = JSON.parse(DB.get(KEYS.kr[subKey])) || [];
                if(modalActiveTab === 'invest') { list.push({id:Date.now(), date:document.getElementById('f-date').value, krw:parseNum(document.getElementById('f-krw').value || 0)}); } 
                else { let y = document.getElementById('f-year').value; let m = document.getElementById('f-month').value; list = list.filter(x=>!(x.year===y && x.month===m)); list.push({year:y, month:m, krw:parseNum(document.getElementById('f-krw').value || 0)}); }
                DB.set(KEYS.kr[subKey], JSON.stringify(list));
            }
            else if(activeCat === 'pension') {
                let subKey = modalActiveTab==='invest'?'inv':'bal';
                let list = JSON.parse(DB.get(KEYS.pension[subKey])) || [];
                if(modalActiveTab === 'invest') {
                    let vI = parseNum(document.getElementById('f-irp').value || 0); let vP = parseNum(document.getElementById('f-pension').value || 0);
                    if(vI === 0 && vP === 0) { alert("금액을 기입해 주십시오."); return; }
                    if(vI > 0) list.push({id:Date.now(), date:document.getElementById('f-date').value, type:'irp', krw:vI});
                    if(vP > 0) list.push({id:Date.now()+1, date:document.getElementById('f-date').value, type:'pension', krw:vP});
                } else {
                    let y = document.getElementById('f-year').value; let m = document.getElementById('f-month').value; list = list.filter(x=>!(x.year===y && x.month===m));
                    list.push({year:y, month:m, irp:parseNum(document.getElementById('f-irp').value || 0), pension:parseNum(document.getElementById('f-pension').value || 0)});
                }
                DB.set(KEYS.pension[subKey], JSON.stringify(list));
            }
            else if(activeCat === 're' && modalActiveTab === 'loan') {
                let list = JSON.parse(DB.get(KEYS.re.loan)) || [];
                let y = document.getElementById('f-year').value; let m = document.getElementById('f-month').value; list = list.filter(x=>!(x.year===y && x.month===m));
                let c1 = parseNum(document.getElementById('f-c1').value || 0); let c2 = parseNum(document.getElementById('f-c2').value || 0); let c3 = parseNum(document.getElementById('f-c3').value || 0); let c4 = parseNum(document.getElementById('f-c4').value || 0);
                let cr1 = parseNum(document.getElementById('f-cr1').value || 0); let cr2 = parseNum(document.getElementById('f-cr2').value || 0); let cr3 = parseNum(document.getElementById('f-cr3').value || 0);
                let total = c1+c2+c3+c4+cr1+cr2+cr3;
                list.push({year:y, month:m, company1:c1, company2:c2, company3:c3, company4:c4, credit1:cr1, credit2:cr2, credit3:cr3, total:total});
                DB.set(KEYS.re.loan, JSON.stringify(list));
            }
            closeModal(); renderMainViewport();
        }

        function deleteRecord(type, id) {
            if(!confirm("해당 원장 기록을 지우시겠습니까?")) return;
            let subKey = type === 'invest' ? 'inv' : (type === 'balance' ? 'bal' : 'int');
            let targetKey = KEYS[activeCat][subKey]; if(activeCat==='re') targetKey = KEYS.re.loan;
            let list = JSON.parse(DB.get(targetKey)) || [];
            if(type === 'invest') list = list.filter(x => x.id != id); else list = list.filter(x => (x.year+x.month) != id);
            DB.set(targetKey, JSON.stringify(list)); renderMainViewport();
        }

        function backupAllData() {
            let backup = {}; Object.keys(KEYS).forEach(c => { Object.keys(KEYS[c]).forEach(k => { backup[KEYS[c][k]] = DB.get(KEYS[c][k]); }); });
            const blob = new Blob([JSON.stringify(backup)], {type: 'application/json'}); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `BULL_TOTAL_PORTFOLIO_MASTER.json`; a.click();
        }

        function restoreAllData(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(evt) {
                try {
                    const data = JSON.parse(evt.target.result);
                    await DB.setAll(data);
                    triggerSaveFeedback(); switchCategory(activeCat);
                    alert("🚀 데이터 허브 원장 복원이 완벽하게 처리되었습니다!");
                } catch (err) {
                    alert("❌ 백업 파일 파싱에 실패했습니다.");
                }
            };
            reader.readAsText(file);
        }

        function parseNum(val) {
            if (typeof val === 'number') return val;
            return Number(String(val).replace(/[^0-9.-]/g, '')) || 0;
        }

        function formatComma(el) {
            let raw = el.value.replace(/[^0-9]/g, '');
            el.value = raw ? Number(raw).toLocaleString() : '';
        }

        function triggerSaveFeedback() {
            const btn = document.querySelector('button[onclick="openModal()"]');
            if (!btn) return;
            const orig = btn.textContent;
            btn.textContent = '✅ 저장됨';
            setTimeout(() => { btn.textContent = orig; }, 1000);
        }

        function toggleAccordion(type) {
            if (type === 'invest') isInvestOpen = !isInvestOpen;
            else isBalanceOpen = !isBalanceOpen;
            renderMainViewport();
        }

        function setSubToggle(type, sub) {
            if (type === 'invest') investSub = sub;
            else balanceSub = sub;
            renderMainViewport();
        }

        function toggleUSInterestSub(sub) {
            interestSub = sub;
            renderMainViewport();
        }

        function toggleRELoanAccordion(type) {
            if (type === 'company') isReCompanyOpen = !isReCompanyOpen;
            else isReCreditOpen = !isReCreditOpen;
            renderInterestOrLoanView(JSON.parse(DB.get(KEYS.re.loan)) || [], true);
        }

        function setRELoanToggle(type, sub) {
            if (type === 'company') reCompanySub = sub;
            else reCreditSub = sub;
            renderInterestOrLoanView(JSON.parse(DB.get(KEYS.re.loan)) || [], true);
        }

        function toggleREInterestSub(sub) {
            interestSub = sub;
            renderMainViewport();
        }

        function getREInterestYearlyMarkup(dataList) {
            let yMap = {};
            dataList.forEach(x => { yMap[x.year] = (yMap[x.year] || 0) + Number(x.total || 0); });
            return Object.keys(yMap).sort().reverse().map(y =>
                `<div class="bg-[#222] p-4 rounded-xl border border-[#2d2d2d] flex justify-between items-center text-xs">
                    <div><span class="grey-box">${y}년</span></div>
                    <div class="text-right font-bold text-white text-sm">₩${yMap[y].toLocaleString()}</div>
                </div>`
            ).join('');
        }

    </script>
</body>
</html>
